<script>
function openPage(file) {
    const newTab = window.open("about:blank", "_blank");

    newTab.document.write(`
        <html>
        <head>
            <style>
                /* Make sure the page itself has no margin or padding */
                html, body {
                    margin: 0;
                    padding: 0;
                    height: 100%;
                    overflow: hidden;
                }

                /* Container fills entire viewport */
                #appContainer {
                    width: 100vw;
                    height: 100vh;
                    margin: 0;
                    padding: 0;
                }

                /* Iframe fills container perfectly */
                #fullscreenFrame {
                    width: 100%;
                    height: 100%;
                    border: 0;         /* no border at all */
                    display: block;    /* removes inline spacing */
                    margin: 0;         /* remove any iframe spacing */
                    padding: 0;
                }
            </style>
        </head>
        <body>
            <div id="appContainer">
                <iframe id="fullscreenFrame" src="${file}"></iframe>
            </div>
        </body>
        </html>
    `);

    newTab.document.close();
}
</script>
