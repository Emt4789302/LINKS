<script>
function openPage(file) {
    const newTab = window.open("about:blank", "_blank");

    const doc = newTab.document;

    doc.open();
    doc.write(`
        <!DOCTYPE html>
        <html>
        <head>
            <title>LEGIT GAMES</title>

            <link rel="icon" href="/normal.png">

            <style>
                html, body {
                    margin: 0;
                    padding: 0;
                    height: 100%;
                    overflow: hidden;
                }

                #appContainer {
                    width: 100vw;
                    height: 100vh;
                }

                iframe {
                    width: 100%;
                    height: 100%;
                    border: none;
                    display: block;
                }
            </style>
        </head>

        <body>
            <iframe src="${file}"></iframe>
        </body>
        </html>
    `);

    doc.close();

    // 🔥 Force title + favicon (this is the important part)
    newTab.document.title = "LEGIT GAMES";

    const icon = newTab.document.createElement("link");
    icon.rel = "icon";
    icon.href = "/normal.png";
    newTab.document.head.appendChild(icon);
}
</script>
