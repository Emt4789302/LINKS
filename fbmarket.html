<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef1f5;
}

/* Top bar */
.topbar {
  background: white;
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.search {
  flex: 1;
  padding: 10px 15px;
  border-radius: 25px;
  border: none;
  background: #f0f2f5;
}

/* Layout */
.container {
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 230px;
  background: white;
  padding: 15px;
  height: calc(100vh - 50px);
}

.category {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.category:hover,
.category.active {
  background: #dfe6ff;
}

/* Grid */
.grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* Card */
.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-body {
  padding: 10px;
}

.price {
  font-weight: bold;
}

.meta {
  font-size: 12px;
  color: gray;
}

/* Modal */
.modal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: white;
  width: 400px;
  border-radius: 12px;
  overflow: hidden;
}

.modal-content img {
  width: 100%;
}

.modal-body {
  padding: 15px;
}

.close {
  float: right;
  cursor: pointer;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">Marketplace</div>
  <input class="search" placeholder="Search items..." oninput="render()">
</div>

<div class="container">

  <div class="sidebar">
    <div class="category active" onclick="filterCategory('All')">All</div>
    <div class="category" onclick="filterCategory('Dirt Bikes')">Dirt Bikes</div>
    <div class="category" onclick="filterCategory('ATVs')">ATVs</div>
    <div class="category" onclick="filterCategory('Trucks')">Trucks</div>
    <div class="category" onclick="filterCategory('Tools')">Tools</div>
    <div class="category" onclick="filterCategory('Farm')">Farm</div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<!-- Modal -->
<div class="modal" id="modal" onclick="closeModal(event)">
  <div class="modal-content">
    <img id="mImg">
    <div class="modal-body">
      <span class="close" onclick="closeModal(event)">✖</span>
      <h3 id="mTitle"></h3>
      <p id="mPrice"></p>
      <p id="mOwner"></p>
      <p id="mLocation"></p>
    </div>
  </div>
</div>

<script>

let currentCategory = "All";
let searchText = "";

const listings = [
  {title:"Honda CRF250", price:"$3200", owner:"Tyler M.", location:"Erie", cat:"Dirt Bikes"},
  {title:"Yamaha YZ125", price:"$2800", owner:"Cole R.", location:"Girard", cat:"Dirt Bikes"},
  {title:"Kawasaki KX85", price:"$1800", owner:"Noah B.", location:"Erie", cat:"Dirt Bikes"},

  {title:"Polaris Sportsman 570", price:"$4500", owner:"Jake H.", location:"Edinboro", cat:"ATVs"},
  {title:"Honda FourTrax", price:"$2200", owner:"Logan P.", location:"Waterford", cat:"ATVs"},
  {title:"Yamaha Raptor 660", price:"$3000", owner:"Brady S.", location:"Erie", cat:"ATVs"},

  {title:"Ford F-150", price:"$4200", owner:"Ryan K.", location:"Erie", cat:"Trucks"},
  {title:"Chevy Silverado", price:"$5000", owner:"Luke G.", location:"Girard", cat:"Trucks"},

  {title:"Chainsaw Stihl", price:"$300", owner:"Dylan M.", location:"Local", cat:"Tools"},
  {title:"Log Splitter", price:"$900", owner:"Trevor H.", location:"County", cat:"Tools"},

  {title:"Riding Mower", price:"$1200", owner:"Caleb J.", location:"Erie", cat:"Farm"},
  {title:"Used Tractor", price:"$3800", owner:"Bill R.", location:"Waterford", cat:"Farm"},
];

const grid = document.getElementById("grid");

function render() {
  grid.innerHTML = "";

  const filtered = listings.filter(item => {
    const matchCategory = currentCategory === "All" || item.cat === currentCategory;
    const matchSearch = item.title.toLowerCase().includes(searchText.toLowerCase());
    return matchCategory && matchSearch;
  });

  filtered.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.onclick = () => openModal(item);

    card.innerHTML = `
      <img src="https://via.placeholder.com/300">
      <div class="card-body">
        <div class="price">${item.price}</div>
        <div>${item.title}</div>
        <div class="meta">${item.location}</div>
        <div class="meta">Seller: ${item.owner}</div>
      </div>
    `;

    grid.appendChild(card);
  });
}

function filterCategory(cat) {
  currentCategory = cat;

  document.querySelectorAll(".category").forEach(el => {
    el.classList.remove("active");
    if (el.innerText === cat || (cat === "All" && el.innerText === "All")) {
      el.classList.add("active");
    }
  });

  render();
}

document.querySelector(".search").addEventListener("input", e => {
  searchText = e.target.value;
  render();
});

function openModal(item) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("mImg").src = "https://via.placeholder.com/400";
  document.getElementById("mTitle").innerText = item.title;
  document.getElementById("mPrice").innerText = item.price;
  document.getElementById("mOwner").innerText = "Seller: " + item.owner;
  document.getElementById("mLocation").innerText = item.location;
}

function closeModal(e) {
  if (e.target.id === "modal" || e.target.className === "close") {
    document.getElementById("modal").style.display = "none";
  }
}

render();

</script>

</body>
</html>
